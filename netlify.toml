[build]
  command = "npm run build"
  publish = "dist"

# Environment variables - Set these in Netlify UI or as deploy context
[context.production.environment]
  # The main Vite app API key
  VITE_GEMINI_API_KEY = ""

  # For the standalone EduHub HTML (project/index.html)
  # This needs to be set in Netlify Environment Variables
  GEMINI_API_KEY = ""

# Inject environment variables into the project/index.html at build time
[[redirects]]
  from = "/project/*"
  to = "/project/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
